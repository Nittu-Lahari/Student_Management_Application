<h1>Student Management</h1>
<div class="student-header">

    <button
    id="addStudentBtn"
    onclick="toggleForm()">

        + Add Student

    </button>

</div>

<div
id="studentFormContainer"
class="student-form-container"
style="display:none;">

    <h2>Add Student</h2>

    <input
    type="hidden"
    id="studentId">

    <div class="form-group">

        <label>Name</label>

        <input
        type="text"
        id="name">

    </div>

    <div class="form-group">

        <label>Email</label>

        <input
        type="email"
        id="email">

    </div>

    <div class="form-group">

        <label>Class</label>

        <input
        type="text"
        id="class_name">

    </div>

    <div class="form-group">

        <label>Section</label>

        <input
        type="text"
        id="section">

    </div>

    <div class="form-group">

        <label>Phone</label>

        <input
        type="text"
        id="phone">

    </div>

    <div>

        <button
        onclick="saveStudent()">

        Save

        </button>

        <button
        onclick="toggleForm()">

        Cancel

        </button>

    </div>

</div>
<div class="table-container">
<table>

    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Class</th>
            <th>Section</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="studentTable">

    </tbody>

</table>
</div>
<script src="js/students.js"></script>

</body>
