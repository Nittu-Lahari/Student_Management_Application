<h1>Marks Management</h1>

<div class="marks-header">

    <button
    id="addMarksBtn"
    onclick="toggleMarksForm()">

        + Add Marks

    </button>

</div>
<div class="summary-cards">

    <div class="summary-card">

        <h3>Total Records</h3>

        <h2 id="totalRecords">
            0
        </h2>

    </div>

    <div class="summary-card">

        <h3>Highest Marks</h3>

        <h2 id="highestMarks">
            0
        </h2>

    </div>

    <div class="summary-card">

        <h3>Average Marks</h3>

        <h2 id="averageMarks">
            0
        </h2>

    </div>

</div>
<div class="filter-container">

    <select id="studentFilter">

        <option value="">
            All Students
        </option>

    </select>

    <select id="subjectFilter">

        <option value="">
            All Subjects
        </option>

        <option value="Java">
            Java
        </option>

        <option value="DBMS">
            DBMS
        </option>

        <option value="Python">
            Python
        </option>

        <option value="CN">
            CN
        </option>

    </select>

    <button onclick="loadMarks()">
        Apply Filter
    </button>

    <button onclick="clearFilters()">
        Clear Filter
    </button>

</div>

<div
id="marksFormContainer"
class="marks-form-container"
style="display:none;">

    <h2 id="marksFormTitle">
        Add Marks
    </h2>

    <input
    type="hidden"
    id="marksId">

    <div class="form-group">

        <label>Student</label>

        <select id="student_id"></select>

    </div>

    <div class="form-group">

        <label>Subject</label>

        <input
        type="text"
        id="subject">

    </div>

    <div class="form-group">

        <label>Marks</label>

        <input
        type="number"
        id="marks">

    </div>

    <button onclick="saveMarks()">

        Save

    </button>

    <button onclick="toggleMarksForm()">

        Cancel

    </button>

</div>
<div class="table-container">
<table>

    <thead>
        <tr>
            <th>ID</th>
            <th>Student Name</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="marksTable">

    </tbody>

</table>
</div>
<script src="js/marks.js"></script>

</body>
</html>
