    </script>

</head>

<body>

<h1>Faculty Profile</h1>

<div class="profile-header">

    <div class="profile-avatar">

        <i class="fas fa-user-circle"></i>

    </div>

    <h2 id="profileHeaderName"></h2>

    <p id="facultyShortInfo"></p>

</div>

<div id="profileView" class="profile-card">

    <div class="profile-card-header">

        <h2>Profile Details</h2>

        <button onclick="showEditForm()">

            <i class="fas fa-edit"></i>

            Edit Profile

        </button>

    </div>

    <div class="profile-row">

        <label>ID</label>

        <span id="viewFacultyId"></span>

    </div>

    <div class="profile-row">

        <label>Name</label>

        <span id="viewFacultyName"></span>

    </div>

    <div class="profile-row">

        <label>Email</label>

        <span id="viewFacultyEmail"></span>

    </div>

    <div class="profile-row">

        <label>Phone</label>

        <span id="viewFacultyPhone"></span>

    </div>

</div>

<div id="profileEditForm"
     class="profile-card"
     style="display:none;">
    <h2>Edit Profile</h2>
    <div class="profile-row">
        <label>Name</label>
        <input type="text"
               id="editFacultyName">
    </div>

    <div class="profile-row">

        <label>Email</label>

        <input type="email"
               id="facultyEmail"
               readonly>

    </div>

    <div class="profile-row">

        <label>Phone</label>

        <input type="text"
               id="facultyPhone">

    </div>

    <button onclick="updateProfile()">

        Save Changes

    </button>

    <button onclick="cancelEdit()">

        Cancel

    </button>

</div>

<div class="profile-card">

    <div class="profile-card-header">

        <h2>Security</h2>

        <button onclick="showPasswordForm()">

            <i class="fas fa-lock"></i>

            Change Password

        </button>

    </div>

    <div id="passwordForm"
         style="display:none;">

        <input type="password"
               id="currentPassword"
               placeholder="Current Password">

        <input type="password"
               id="newPassword"
               placeholder="New Password">

        <input type="password"
               id="confirmPassword"
               placeholder="Confirm Password">

        <button onclick="changePassword()">

            Update Password

        </button>

    </div>

</div>

<script src="js/faculty-profile.js"></script>

</body>
</html>
